services:
  postgres:
    image: postgres:16
    container_name: drivecontrol-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: drivecontrol
      POSTGRES_USER: drivecontrol
      POSTGRES_PASSWORD: drivecontrol
    volumes:
      - drivecontrol_postgres_data:/var/lib/postgresql/data

volumes:
  drivecontrol_postgres_data:
