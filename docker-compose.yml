services:
  mysql:
    image: mysql:8
    container_name: drivecontrol-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: drivecontrol
      MYSQL_DATABASE: drivecontrol
      MYSQL_USER: drivecontrol
      MYSQL_PASSWORD: drivecontrol
    volumes:
      - drivecontrol_mysql_data:/var/lib/mysql

volumes:
  drivecontrol_mysql_data:
