services:
  - type: web
    name: drivecontrol-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run db:generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: drivecontrol-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: drivecontrol-db
    region: oregon
    plan: free
    databaseName: drivecontrol
    user: drivecontrol
